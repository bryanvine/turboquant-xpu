<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/favicon-180.png' | relative_url }}">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  <script>
    // open all off-page links in a new tab; leave in-page anchors (#...) alone
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href');
        if (h && h.charAt(0) !== '#' && !a.target) { a.target = '_blank'; a.rel = 'noopener'; }
      });
    });
  </script>
</head>
